<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | NB Academy</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: var(--bg-light); }
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Admin Login Overlay */
        #admin-login {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: var(--transition);
        }
        .login-box {
            background: var(--bg-white);
            padding: 3rem;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-xl);
            text-align: center;
        }

        /* Admin Sidebar */
        .admin-sidebar {
            width: 280px;
            background: var(--primary-blue);
            color: white;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }
        .admin-logo {
            font-size: 1.5rem;
            font-family: 'Lora', serif;
            font-weight: bold;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .admin-nav a {
            color: rgba(255,255,255,0.7);
            padding: 1rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .admin-nav a.active, .admin-nav a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* Admin Content */
        .admin-content {
            flex: 1;
            padding: 3rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        /* Upload Zone */
        .upload-card {
            background: white;
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }
        .upload-zone {
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-lg);
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 2rem;
            background: #f8fafc;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--secondary-blue);
            background: rgba(59, 130, 246, 0.05);
        }
        .upload-zone i {
            font-size: 3rem;
            color: var(--secondary-blue);
            margin-bottom: 1rem;
        }
        #file-input { display: none; }
        .file-name {
            margin-top: 1rem;
            font-weight: 500;
            color: var(--primary-green);
        }
    </style>
</head>
<body>

    <!-- Admin Login Screen -->
    <div id="admin-login">
        <div class="login-box animate-fade-up">
            <i class="fa-solid fa-user-shield" style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 1rem;"></i>
            <h2 style="margin-bottom: 2rem;">Admin Access</h2>
            <form id="login-form">
                <div class="form-group">
                    <input type="password" id="admin-password" class="form-control" placeholder="Enter Admin Password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                <p id="login-error" style="color: red; margin-top: 1rem; display: none;">Incorrect password.</p>
                <p style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted);">Default password is: admin123</p>
            </form>
            <a href="index.html" style="display: block; margin-top: 1.5rem; font-size: 0.9rem;">Return to Homepage</a>
        </div>
    </div>

    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <i class="fa-solid fa-graduation-cap"></i>
                NB Academy
            </div>
            <nav class="admin-nav">
                <a href="#" class="active"><i class="fa-solid fa-upload"></i> Upload Materials</a>
                <a href="#"><i class="fa-solid fa-folder-open"></i> Manage Files</a>
                <a href="#"><i class="fa-solid fa-users"></i> Student Registrations</a>
                <a href="index.html" style="margin-top: auto;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout & Return</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h2>Upload Study Materials</h2>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div style="width: 40px; height: 40px; background: var(--secondary-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">AD</div>
                    <span>Admin User</span>
                </div>
            </div>

            <div class="upload-card animate-fade-up">
                <form id="upload-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                        <div class="form-group">
                            <label>Title of Material</label>
                            <input type="text" class="form-control" placeholder="e.g. Father's Help - Full Notes" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select class="form-control" required>
                                <option value="">Select Category...</option>
                                <option value="class-10-sem-1">Class X - Semester 1</option>
                                <option value="class-10-sem-2">Class X - Semester 2</option>
                                <option value="class-11-sem-1">Class XI - Semester 1</option>
                                <option value="class-11-sem-2">Class XI - Semester 2</option>
                                <option value="class-12-sem-1">Class XII - Semester 1</option>
                                <option value="class-12-sem-2">Class XII - Semester 2</option>
                                <option value="class-12-sem-3">Class XII - Semester 3</option>
                                <option value="class-12-sem-4">Class XII - Semester 4</option>
                                <option value="mock-test">Mock Test Papers</option>
                            </select>
                        </div>
                    </div>

                    <div class="upload-zone" id="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <h3>Drag & Drop your file here</h3>
                        <p style="color: var(--text-muted); margin: 0.5rem 0 1rem;">or</p>
                        <button type="button" class="btn btn-outline" style="color: var(--primary-blue); border-color: var(--primary-blue);" onclick="document.getElementById('file-input').click()">Browse Files</button>
                        <input type="file" id="file-input" accept=".pdf,.doc,.docx" required>
                        <div class="file-name" id="file-name-display"></div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="upload-btn" style="width: 100%; font-size: 1.1rem; padding: 1rem;"><i class="fa-solid fa-upload" style="margin-right: 0.5rem;"></i> Upload Material</button>
                    
                    <div id="upload-success" style="display: none; background: #dcfce7; color: #166534; padding: 1rem; border-radius: var(--radius-md); text-align: center; margin-top: 1.5rem;">
                        <i class="fa-solid fa-circle-check" style="margin-right: 0.5rem;"></i> Material uploaded successfully! (Simulation)
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
